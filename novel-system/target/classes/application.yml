server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/novel_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
      data-locations: classpath:data.sql
  mvc:
    async:
      request-timeout: 30s
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

jwt:
  secret: mySecretKey12345678901234567890123456789012345678901234567890
  expiration: 604800000  # 7 天

cors:
  allowed-origins: http://localhost:8081,http://localhost:8082,http://localhost:8083

# 小说数据初始化配置
novel:
  data:
    init:
      enabled: false  # 设置为false禁用小说数据初始化
